services:
  - type: web
    name: neuroad-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    disk:
      name: neuroad-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: NEUROAD_STORAGE_DIR
        value: /data/neuroad/storage
      - key: NEUROAD_DB_PATH
        value: /data/neuroad/neuroad.db
      - key: NEUROAD_WORKERS
        value: "1"
      - key: NEUROAD_MAX_UPLOAD_MB
        value: "200"
      - key: NEUROAD_MAX_SOURCE_SECONDS
        value: "600"
      - key: NEUROAD_MAX_ANALYSIS_SECONDS
        value: "180"
      - key: NEUROAD_MODEL_DIR
        value: /opt/neuroad/models
      - key: NEUROAD_ENABLE_TRANSCRIPTION
        value: "1"
      - key: NEUROAD_TRANSCRIPTION_ENGINE
        value: vosk
      - key: NEUROAD_ENABLE_OBJECT_DETECTION
        value: "1"
      - key: NEUROAD_OBJECT_DETECTION_ENGINE
        value: mobilenet_ssd
      - key: VOSK_MODEL_DIR
        value: /opt/neuroad/models/vosk-model-small-en-us-0.15
      - key: MOBILENET_SSD_GRAPH
        value: /opt/neuroad/models/mobilenet-ssd/frozen_inference_graph.pb
      - key: MOBILENET_SSD_CONFIG
        value: /opt/neuroad/models/mobilenet-ssd/ssd_mobilenet_v1_coco.pbtxt
      - key: WHISPER_MODEL
        value: tiny
      - key: YOLO_MODEL
        value: yolov8n.pt
      - key: CORS_ORIGINS
        sync: false
