[build]
  base = "."
  command = "node scripts/verify-web-env.mjs && npm --workspace apps/web run build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"
  NEXT_PUBLIC_API_BASE = "https://neuroadweb-production.up.railway.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
